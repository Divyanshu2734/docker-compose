name: React Django Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build React Application
        run: |
          cd frontend
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Django Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Django Configuration Check
        run: |
          cd backend
          python manage.py check

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/django-app:${{ github.sha }} \
          ./backend

      - name: Build Frontend Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/react-app:${{ github.sha }} \
          ./frontend

      - name: Push Backend Image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }}

      - name: Push Frontend Image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.sha }}

